<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Materiais SRT Soluções</title>

  <!-- Favicon -->
  <!-- <link rel="icon" href="favicon.ico" type="image/x-icon"> -->

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- jsPDF CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 Lista de Materiais SRT Soluções</h1>
</header>

<div class="container">

  <div class="box">
    <h2>Categorias</h2>

    <div class="input-group">
      <input id="categoriaInput" placeholder="Nova categoria (ex: Elétrica)"
             onkeydown="if(event.key==='Enter') addCategoria()">
      <button onclick="addCategoria()">Adicionar</button>
    </div>

    <div class="busca-group">
      <!-- FIX: Enter no campo de busca agora dispara a pesquisa -->
      <input id="buscaInputGlobal" placeholder="Buscar item no sistema..."
             onkeydown="if(event.key==='Enter') abrirBuscaGlobal()">
      <button onclick="abrirBuscaGlobal()">Buscar</button>
    </div>

    <div id="itens">
      <!-- Categorias serão renderizadas aqui -->
    </div>
  </div>

  <div class="box">
    <h2>Minha Lista</h2>

    <button class="btn-clear" onclick="limparLista()">🧹 Limpar Lista</button>
    <button class="btn-pdf" onclick="gerarPDF()">📄 Exportar PDF</button>

    <div id="lista">
      <!-- Itens da lista serão renderizados aqui -->
    </div>
  </div>

</div>

<!-- MODAIS -->
<!-- Modal para exibir conteúdo de categorias/subcategorias -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span id="modalTitulo">Detalhes da Categoria</span>
      <button onclick="fecharModal()">✕</button>
    </div>
    <div id="modalConteudo">
      <!-- Conteúdo de subcategorias e itens será renderizado aqui -->
    </div>
    <div id="modalFooter" class="modal-footer">
      <!-- Botões de ação serão renderizados aqui via JS -->
    </div>
  </div>
</div>

<!-- Modal para exibir resultados da busca global -->
<div id="modalBusca" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span>🔍 Resultados da Busca</span>
      <button onclick="fecharBusca()">✕</button>
    </div>
    <div id="resultadoBusca">
      <!-- Resultados da busca serão renderizados aqui -->
    </div>
    <div class="modal-footer">
      <button onclick="fecharBusca()" class="btn-voltar">✕ Fechar Busca</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // FIX: Usa caminho relativo (./service-worker.js) para funcionar em subdiretórios também
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(registration => {
          console.log('Service Worker registrado com sucesso:', registration.scope);
        })
        .catch(error => {
          console.log('Falha no registro do Service Worker:', error);
        });
    });
  }
</script>
</body>
</html>
